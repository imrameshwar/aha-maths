<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>You're offline — Aha Maths</title>
  <meta name="robots" content="noindex">
  <script>
    (function () {
      var t = localStorage.getItem('am-theme');
      if (t) { document.documentElement.setAttribute('data-theme', t); return; }
      if (!window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/logo-mark.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="styles/error.css">
</head>
<body>

<header class="site-header">
  <div class="container">
    <a class="logo" href="index.html">
      <div class="logo-mark">AM</div>
      Aha Maths
    </a>
  </div>
</header>

<!-- Deliberately no JS module imports here (beyond the reload button): this
     page renders WHILE offline, so it can't depend on anything that might
     itself need the network to resolve. Both languages shown together. -->
<main class="error-page">
  <div class="container error-stage">
    <img class="error-mascot" src="assets/mascot.svg" alt="" width="88" height="88">
    <h1>You're offline · आप ऑफ़लाइन हैं</h1>
    <p>
      No internet right now — but any lesson or the Story of Numbers you've already opened once
      still works offline.<br>
      <span style="color:var(--text-lo)">अभी इंटरनेट नहीं है — पर जो पाठ या कहानी तुम पहले खोल चुके हो, वो ऑफ़लाइन भी चलेगी।</span>
    </p>
    <div class="error-actions">
      <button class="btn-primary" onclick="location.reload()">↻ Try again · फिर कोशिश करो</button>
      <a class="error-secondary" href="index.html">← Back to the map · नक्शे पर वापस</a>
    </div>
  </div>
</main>

</body>
</html>
