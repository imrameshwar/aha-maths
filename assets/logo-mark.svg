<!-- logo-mark.svg — the Aha Maths brand mark (icon lockup, no wordmark).
     A geometric compass-construction "A" interlocked with an "M", white π at the
     centre, on a dark disc. Vector recreation of the brand logo; used for the
     favicon, apple-touch-icon and PWA icons (rasterised → PNG). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Aha Maths">
  <defs>
    <radialGradient id="amDisc" cx="0.5" cy="0.42" r="0.65">
      <stop offset="0" stop-color="#0C1626"/>
      <stop offset="0.68" stop-color="#050810"/>
      <stop offset="1" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="amCyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6BEAFF"/>
      <stop offset="1" stop-color="#12B4E0"/>
    </linearGradient>
  </defs>

  <!-- disc -->
  <circle cx="256" cy="256" r="256" fill="url(#amDisc)"/>

  <!-- construction geometry -->
  <circle cx="256" cy="256" r="196" fill="none" stroke="#1FB6D8" stroke-width="2" opacity="0.85"/>
  <g fill="none" stroke="#7FE3F5" stroke-width="1.4" opacity="0.42" stroke-dasharray="3 8">
    <circle cx="256" cy="268" r="98"/>
    <line x1="66" y1="256" x2="446" y2="256"/>
    <line x1="256" y1="72" x2="256" y2="446"/>
    <line x1="256" y1="100" x2="122" y2="392"/>
    <line x1="256" y1="100" x2="390" y2="392"/>
  </g>
  <g fill="#43D6F0">
    <circle cx="256" cy="100" r="6"/>
    <circle cx="66" cy="256" r="6"/>
    <circle cx="446" cy="256" r="6"/>
    <circle cx="256" cy="446" r="6"/>
    <circle cx="256" cy="268" r="5" fill="#8DEBFA"/>
  </g>

  <!-- the A -->
  <path d="M150,424 L256,100 L362,424" fill="none" stroke="url(#amCyan)"
        stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- interlocked M crossbar + ribbon loops -->
  <path d="M186,320 L222,286 L256,312 L290,286 L324,320" fill="none" stroke="url(#amCyan)"
        stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="186" cy="320" r="12" fill="none" stroke="url(#amCyan)" stroke-width="12"/>
  <circle cx="324" cy="320" r="12" fill="none" stroke="url(#amCyan)" stroke-width="12"/>

  <!-- π (white) -->
  <g stroke="#FFFFFF" stroke-linecap="round" fill="none">
    <line x1="222" y1="336" x2="298" y2="336" stroke-width="13"/>
    <line x1="242" y1="336" x2="238" y2="404" stroke-width="12"/>
    <path d="M280,336 L284,392 q2,14 17,13" stroke-width="12"/>
  </g>
</svg>
