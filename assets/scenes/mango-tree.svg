<!--
  mango-tree.svg — Count-Quest PLACEHOLDER scene (code-drawn stand-in).

  This is the "AI mood" layer of the Count-Quest accuracy-sandwich, drawn by hand
  so the whole tap-and-count pipeline works end-to-end TODAY. To ship the real
  premium version: generate a Higgsfield "Soul" still of the same scene (a warm
  Rajasthani mango tree, storybook-painterly), curate it so every mango is fully
  visible + separated + same scale, then re-author the hotspots in
  tools/hotspot-author.html and swap the `image` path in content/scenes/mango-tree.json.
  HARD RULE: the count (5) and the hotspot coords are the code-owned TRUTH — never
  the generated pixels. viewBox is 800×600 (4:3); hotspots are normalized to it.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img"
     aria-label="A mango tree in a warm courtyard, with mangoes hanging in the leaves">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#FFF3DE"/>
      <stop offset="0.6" stop-color="#FDE7CC"/>
      <stop offset="1"   stop-color="#F6DCC0"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.86" cy="0.16" r="0.5">
      <stop offset="0"   stop-color="#FFF7E0" stop-opacity="0.9"/>
      <stop offset="1"   stop-color="#FFF7E0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A7D48A"/>
      <stop offset="1" stop-color="#7FBF6A"/>
    </linearGradient>
    <linearGradient id="canopy" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#5BA85C"/>
      <stop offset="1" stop-color="#3E8A46"/>
    </linearGradient>
    <linearGradient id="canopy2" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#6FB96A"/>
      <stop offset="1" stop-color="#4C9A50"/>
    </linearGradient>
    <linearGradient id="trunk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8A5A34"/>
      <stop offset="1" stop-color="#6E4526"/>
    </linearGradient>
    <linearGradient id="mangoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBC53B"/>
      <stop offset="1" stop-color="#F1801E"/>
    </linearGradient>

    <!-- one mango, centred on the origin; instanced via <use> -->
    <g id="mango">
      <ellipse cx="0" cy="0" rx="26" ry="32" fill="url(#mangoGrad)"/>
      <ellipse cx="-8" cy="-13" rx="7" ry="11" fill="#FFFFFF" opacity="0.34"/>
      <path d="M0,-31 q3,-10 11,-14" stroke="#7C5B36" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M9,-42 q15,-5 22,6 q-15,5 -22,-6 Z" fill="#4E9A51"/>
    </g>

    <!-- the decoy: a little bird (clearly not a mango) -->
    <g id="bird">
      <path d="M-20,6 l-16,7 l13,2 Z" fill="#55708F"/>
      <path d="M-7,-2 q-15,-7 -24,4 q15,7 24,-4 Z" fill="#55708F"/>
      <ellipse cx="0" cy="0" rx="21" ry="15" fill="#6E88A8"/>
      <circle cx="17" cy="-9" r="10" fill="#7E97B4"/>
      <path d="M26,-9 l13,-3 l-12,8 Z" fill="#F59E0B"/>
      <circle cx="19" cy="-11" r="2.2" fill="#1F2937"/>
    </g>
  </defs>

  <!-- backdrop -->
  <rect width="800" height="600" fill="url(#sky)"/>
  <rect width="800" height="600" fill="url(#sun)"/>
  <!-- distant soft hills -->
  <ellipse cx="180" cy="470" rx="260" ry="70" fill="#CFE6B4" opacity="0.7"/>
  <ellipse cx="640" cy="480" rx="240" ry="66" fill="#CFE6B4" opacity="0.6"/>
  <!-- ground -->
  <path d="M0,470 Q400,420 800,470 L800,600 L0,600 Z" fill="url(#ground)"/>

  <!-- trunk + a couple of branches -->
  <path d="M372,600 L388,360 Q400,320 412,360 L428,600 Z" fill="url(#trunk)"/>
  <path d="M400,380 Q470,330 545,300" stroke="#6E4526" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M400,390 Q320,350 250,330" stroke="#6E4526" stroke-width="12" fill="none" stroke-linecap="round"/>

  <!-- canopy (blobby, layered for depth) -->
  <ellipse cx="300" cy="250" rx="180" ry="130" fill="url(#canopy)"/>
  <ellipse cx="520" cy="240" rx="190" ry="135" fill="url(#canopy2)"/>
  <ellipse cx="410" cy="180" rx="180" ry="120" fill="url(#canopy)"/>
  <ellipse cx="250" cy="300" rx="120" ry="90"  fill="url(#canopy2)"/>
  <ellipse cx="560" cy="320" rx="120" ry="88"  fill="url(#canopy)"/>
  <!-- a few darker leaf clusters for texture -->
  <ellipse cx="360" cy="150" rx="60" ry="42" fill="#356F3B" opacity="0.35"/>
  <ellipse cx="540" cy="180" rx="70" ry="46" fill="#356F3B" opacity="0.30"/>
  <ellipse cx="230" cy="240" rx="55" ry="40" fill="#356F3B" opacity="0.30"/>

  <!-- THE 5 MANGOES (the countable truth — matches content/scenes/mango-tree.json) -->
  <use href="#mango" transform="translate(250 210) rotate(-8)"/>
  <use href="#mango" transform="translate(370 180) rotate(6) scale(1.05)"/>
  <use href="#mango" transform="translate(500 220) rotate(-4) scale(0.98)"/>
  <use href="#mango" transform="translate(300 310) rotate(10)"/>
  <use href="#mango" transform="translate(470 330) rotate(-6) scale(1.03)"/>

  <!-- THE DECOY -->
  <use href="#bird" transform="translate(600 150)"/>
</svg>
